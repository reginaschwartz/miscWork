spring:
  application:
    name: rag-java-main
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8001}

rag:
  collection: ${PGVECTOR_COLLECTION:default}
  bulk-index: false
  postgres:
    host: ${POSTGRES_HOST:localhost}
    port: ${POSTGRES_PORT:5432}
    database: ${POSTGRES_DB:ragdb}
    user: ${POSTGRES_USER:raguser}
    password: ${POSTGRES_PASSWORD:ragpass}
  openai:
    api-key: ${OPENAI_API_KEY:}
    chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
    embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-ada-002}

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.rag.main: INFO
